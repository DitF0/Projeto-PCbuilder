<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PC Builder ESEG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-card h2 {
            color: #58a6ff;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .login-card .subtitle {
            color: #8b949e;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-label { color: #c9d1d9; font-weight: 500; }
        .form-control {
            background-color: #0d1117;
            border-color: #30363d;
            color: #c9d1d9;
        }
        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }
        .btn-primary {
            background-color: #238636;
            border-color: #238636;
            font-weight: 600;
        }
        .btn-primary:hover { background-color: #2ea043; border-color: #2ea043; }
        .hint-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-top: 1.5rem;
        }
        .hint-box p { color: #8b949e; font-size: 0.82rem; margin: 0; }
        .hint-box span { color: #58a6ff; font-family: monospace; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>⚙️ PC Builder</h2>
        <p class="subtitle">ESEG — Programação Web</p>

        <div th:if="${param.error}" class="alert alert-danger py-2 text-center small">
            E-mail ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 text-center small">
            Você foi desconectado com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="username" name="username"
                       placeholder="seu@email.com" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
        </form>

        <div class="hint-box">
            <p><strong style="color:#c9d1d9">Admin:</strong> <span>admin@eseg.edu.br</span> / <span>123456</span></p>
            <p class="mt-1"><strong style="color:#c9d1d9">Aluno:</strong> <span>aluno@eseg.edu.br</span> / <span>123456</span></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
